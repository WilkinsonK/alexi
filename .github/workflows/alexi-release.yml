name: Alexi Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build_linux:
    name: Build Linux arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          build-cache: true
      - name: Prepare Artifacts Directory
        run: mkdir -p release_packages
      - name: Build & Package Linux AArch64
        run: |
          xmake f -p linux -a arm64 --toolchain=@zig -m release
          xmake
          xmake install -o staging_linux_arm64
          tar -czvf release_packages/alexi-linux-arm64.tar.gz -C staging_linux_arm64 .
      - name: Build & Package Windows x86_64
        run: |
          xmake f -p windows -a x64 --toolchain=@llvm-mingw -m release
          xmake
          xmake install -o staging_windows_x64
          cd staging_windows_x64 && zip -r ../release_packages/alexi-windows-x64.zip . && cd ..
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release_packages/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_macos:
    name: Build macOS Universal
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          build-cache: true
      - name: Prepare Artifacts Directory
        run: mkdir -p release_packages
      - name: Build & Package macOS Universal
        run: |
          xmake f -p macosx -a "x86_64,arm64" -m release
          xmake
          xmake install -o staging_macos
          tar -czvf release_packages/alexi-macos-universal.tar.gz -C staging_macos .
      - name: Upload to GitHub Release (macOS)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release_packages/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_windows:
    name: Build Windows x64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          build-cache: true
      - name: Install LLVM-MinGW Toolchain
        run: |
          curl -L -o llvm-mingw.tar.xz https://github.com
          mkdir -p opt/llvm-mingw
          tar -xf llvm-mingw.tar.xz -C opt/llvm-mingw --strip-components=1
          echo "$GITHUB_WORKSPACE/opt/llvm-mingw/bin" >> $GITHUB_PATH
      - name: Prepare Artifacts Directory
        run: mkdir -p release_packages
      - name: Build & Package Windows x86_64
        run: |
          xmake f -p windows -a x64 --toolchain=mingw --sdk=$GITHUB_WORKSPACE/opt/llvm-mingw -m release
          xmake
          xmake install -o staging_windows_x64
          cd staging_windows_x64 && zip -r ../release_packages/my_shared_lib-windows-x64.zip . && cd ..
          xmake c -c
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release_packages/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
