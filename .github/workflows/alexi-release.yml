name: Cross-Compile Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build_release:
    name: Build Cross-Compiled Releases
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      # --- Target 1: Linux AArch64 (Using Zig) ---
      - name: Build Linux AArch64
        run: |
          xmake f -p linux -a arm64 --toolchain=zig -m release
          xmake
          mkdir -p build_artifacts
          cp build/linux/arm64/release/your_binary build_artifacts/your_binary_linux_aarch64
          xmake c -c

      # --- Target 2: Windows x86_64 (Using Mingw-w64) ---
      - name: Build Windows x86_64
        run: |
          xmake f -p windows -a x64 --toolchain=mingw -m release
          xmake
          cp build/windows/x64/release/your_binary.exe build_artifacts/your_binary_win64.exe
          xmake c -c

      # --- Create Release & Upload Artifacts ---
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build_artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
