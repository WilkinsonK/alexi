name: Alexi Release
permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

env:
  XMAKE_VERSION: "3.0.9"
  LLVM_VERSION: "22.1.8"

jobs:
  build_linux:
    name: Build Linux
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Toolchain
        run: PLATFORM="linux" scripts/ciinstall.sh
      - name: Prepare Artifacts Directory
        run: mkdir -p release_packages
      - name: Build & Package Linux AArch64
        run: PLATFORM="linux" ARCH=arm64 TOOLCHAIN="@zig" scripts/cibuild.sh
      - name: Build & Package Linux x86_64
        run: PLATFORM="linux" ARCH=x64 TOOLCHAIN="@zig" scripts/cibuild.sh
  build_macos:
    name: Build macOS
    needs: test
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Toolchain
        run: PLATFORM="macos" scripts/ciinstall.sh
      - name: Prepare Artifacts Directory
        run: mkdir -p release_packages
      - name: Build & Package macOS arm64
        run: PLATFORM="macosx" ARCH=arm64 scripts/cibuild.sh
      - name: Build & Package macOS x86_64
        run: PLATFORM="macosx" ARCH=x86_64 scripts/cibuild.sh
  build_win64:
    name: Build Windows x64
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Toolchain
        run: PLATFORM="linux" TARGET="windows" scripts/ciinstall.sh
      - name: Prepare Artifacts Directory
        run: mkdir -p release_packages
      - name: Build & Package Windows x86_64
        run: PLATFORM="windows" ARCH=x64 TOOLCHAIN="mingw" scripts/cibuild.sh

  create_release:
    name: Create GitHub Release
    needs: [build_linux, build_macos, build_win64]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
      - name: Prepare release files
        run: |
          mkdir -p release_files
          find all-artifacts -type f -exec cp {} release_files/ \;
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release_files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
