name: Alexi CI
on:
  push:
    branches: [ "main", "release/*" ]
  pull_request:
    branches: [ "main", "release/*" ]

env:
  XMAKE_VERSION: "3.0.9"

jobs:
  build:
    name: Test Local Build
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - name: Cache xmake binary
      uses: actions/cache@v4
      with:
        path: ~/.xmake
        key: xmake-${{ runner.os }}-${{ env.XMAKE_VERSION }}
        restore-keys: xmake-${{ runner.os }}-
    - name: Setup xmake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: ${{ env.XMAKE_VERSION }}
        build-cache: true
    - name: Build
      run: xmake build
  test:
    name: Run Unit Tests
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - name: Cache xmake binary
      uses: actions/cache@v4
      with:
        path: ~/.xmake
        key: xmake-${{ runner.os }}-${{ env.XMAKE_VERSION }}
        restore-keys: xmake-${{ runner.os }}-
    - name: Setup xmake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: ${{ env.XMAKE_VERSION }}
        build-cache: true
    - name: Build
      run: xmake f --testing=y -y && xmake build -y
    - name: Run all tests
      run: xmake test
  build_linux:
    name: Build Linux arm64
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Cache xmake binary
        uses: actions/cache@v4
        with:
          path: ~/.xmake
          key: xmake-${{ runner.os }}-${{ env.XMAKE_VERSION }}
          restore-keys: xmake-${{ runner.os }}-
      - name: Setup Xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: ${{ env.XMAKE_VERSION }}
          build-cache: true
      - name: Prepare Artifacts Directory
        run: mkdir -p release_packages
      - name: Build & Package Linux AArch64
        run: PLATFORM="linux" ARCH="arm64" TOOLCHAIN="@zig" scripts/cibuild.sh
  build_macos:
    name: Build macOS Universal
    needs: test
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Cache xmake binary
        uses: actions/cache@v4
        with:
          path: ~/.xmake
          key: xmake-${{ runner.os }}-${{ env.XMAKE_VERSION }}
          restore-keys: xmake-${{ runner.os }}-
      - name: Setup Xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: ${{ env.XMAKE_VERSION }}
          build-cache: true
      - name: Prepare Artifacts Directory
        run: mkdir -p release_packages
      - name: Build & Package macOS Universal
        run: PLATFORM="macosx" ARCH="x86_64,arm64" scripts/cibuild.sh
  build_win64:
    name: Build Windows x64
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Cache xmake binary
        uses: actions/cache@v4
        with:
          path: ~/.xmake
          key: xmake-${{ runner.os }}-${{ env.XMAKE_VERSION }}
          restore-keys: xmake-${{ runner.os }}-
      - name: Setup Xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: ${{ env.XMAKE_VERSION }}
          build-cache: true
      - name: Install LLVM-MinGW Toolchain
        run: scripts/ciwinstall.sh >> $GITHUB_PATH
      - name: Prepare Artifacts Directory
        run: mkdir -p release_packages
      - name: Build & Package Windows x86_64
        run: PLATFORM="windows" ARCH="x64" TOOLCHAIN="mingw" scripts/cibuild.sh
